name: PADS Tier-0 guard

on:
  pull_request:
    paths:
      - 'PADS.md'
      - '.pads/tier0.sha256'
      - 'scripts/pads/**'
      - '.github/workflows/pads-tier0-guard.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  tier0-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: python3 -m pip install --upgrade pyyaml

      - name: Verify Tier-0 hash
        run: python3 scripts/pads/tier0-guard.py --spec PADS.md --expected .pads/tier0.sha256
